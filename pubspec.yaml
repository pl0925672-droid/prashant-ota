name: prashant
description: A modern AI-powered study productivity and digital wellbeing app.
version: 1.0.12+14

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.0.2
  sqflite: 2.3.3+1
  usage_stats: ^1.1.0
  google_generative_ai: ^0.4.0
  lottie: ^3.1.0
  provider: ^6.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  fl_chart: ^0.66.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  story_view: ^0.16.6
  flutter_local_notifications: ^17.0.0
  android_alarm_manager_plus: ^4.0.3
  percent_indicator: ^4.2.3
  google_fonts: ^6.1.0
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1
  audioplayers: ^6.5.1
  camera: ^0.11.0+1
  path_provider: ^2.1.2
  video_player: ^2.8.2
  http: ^1.2.0
  syncfusion_flutter_pdfviewer: ^28.1.33
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.10+1
  upgrader: ^9.0.0 # Standard version for stable OTA

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
